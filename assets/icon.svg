<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="灵台·观己 功能医学矩阵绘制台">
  <rect width="180" height="180" rx="32" fill="#F4E9CE"/>
  <!-- 八向心辐射（IFM 八节点意象） -->
  <g stroke="#cdb988" stroke-width="2" opacity="0.85">
    <line x1="90" y1="90" x2="90" y2="30"/>
    <line x1="90" y1="90" x2="132" y2="48"/>
    <line x1="90" y1="90" x2="150" y2="90"/>
    <line x1="90" y1="90" x2="132" y2="132"/>
    <line x1="90" y1="90" x2="90" y2="150"/>
    <line x1="90" y1="90" x2="48" y2="132"/>
    <line x1="90" y1="90" x2="30" y2="90"/>
    <line x1="90" y1="90" x2="48" y2="48"/>
  </g>
  <circle cx="90" cy="90" r="60" fill="none" stroke="#B8860B" stroke-width="2.4" opacity="0.7"/>
  <!-- 中心朱砂印：圆 -->
  <rect x="62" y="62" width="56" height="56" rx="10" fill="none" stroke="#A2402F" stroke-width="4"/>
  <text x="90" y="103" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-size="34" font-weight="700" fill="#A2402F">圆</text>
</svg>
